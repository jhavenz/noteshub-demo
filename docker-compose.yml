services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8486}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: composer.json
        - action: rebuild
          path: composer.lock
        - action: sync+restart
          path: ./src
          target: /app/src
        - action: sync+restart
          path: ./public
          target: /app/public

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-secret}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-app}"
    ports:
      - "${MYSQL_EXTERNAL_PORT:-3336}:3306"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysql_data:
